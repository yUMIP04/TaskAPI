<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--LINKS CSS-->
    <link rel="stylesheet" href="css/style.css">

    <!--LINK TAILWIND-->
     <script src="https://cdn.tailwindcss.com"></script>
    <title>LOGIN</title>
</head>
<body class="flex items-center justify-center min-h-screen bg-slate-100">
     <div class="notifications hidden">
        <p id="notification" class="text-sm font-medium text-center px-4 py-3 rounded-xl border bg-red-50 text-red-600 border-red-200"></p>
    </div>
    
    <div class=" bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

        <h1 class="text-3xl font-bold text-center mb-6 txt-slate-800">Login</h1>

        <form class="flex flex-col gap-4" id="formulario-Login" action="" method="post">

            <label for="correo" class="text-sm font-semibold text-slate-700">Correo</label>
            <input type="email" placeholder="Ingresa el correo" id="correo" required class="px-4 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:outline-none focus_border-indigo-500 focus_bg-white trainsition-all">

                        <label for="password" class="text-am font-semibold text-slate-700">Contraseña</label>
            <input type="password" placeholder="Ingresa la contraseña" id="password" required class="px-4 py-2.5 border border-slate-200 rounded-xl bg-slate-50 focus:outline-none focus_border-indigo-500 focus_bg-white trainsition-all">

            <button type="submit" id="btn-login" class="mt-2 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-colors">Login</button>
        
            <a class="text-center underline decoration-solid text-[#2757F5] " href="./views/Registro.html">¿No tienes cuenta?Registrate</a>
        </form>

    </div>
</body>
<script src="./JS/main.js"></script>
</html>
