<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--LINKS CSS-->
    <link rel="stylesheet" href="css/style.css">

    <!--LINK TAILWIND-->
     <script src="https://cdn.tailwindcss.com"></script>
    <title>LOGIN</title>
</head>
<body class="flex items-center justify-center min-h-screen bg-slate-100">
     <div class="notifications">
        <p id="notification"></p>
    </div>
    
    <div class=" bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
        <h1 class="text-3xl font-bold text-center mb-6 txt-slate-800">Login</h1>
        <form class="flex flex-col gap-4" id="formulario-Login" action="" method="post">
            <label for="correo">Correo</label>
            <input type="email" placeholder="Ingresa el correo" id="correo" required>
                        <label for="password">Contraseña</label>
            <input type="password" placeholder="Ingresa la contraseña" id="password" required>

            <button type="submit" id="btn-login">Login</button>
        </form>
    </div>
</body>
<script src="./JS/main.js"></script>
</html>
